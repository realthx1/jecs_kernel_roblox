name = "realthx1/jecs_kernel_roblox"
version = "0.2.0"
description = "Collection of schedules and plugins for the jecs_kernel package and Roblox."
authors = ["realthx1"]
repository = "https://github.com/realthx1/jecs_kernel_roblox"
license = "MIT"
includes = ["src/**/*", "pesde.toml", "README.md", "LICENSE", ".luaurc"]

[target]
environment = "roblox"
build_files = ["src"]
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[dependencies]
jecs = { wally = "ukendio/jecs", version = "~0.11.0" }
jecs_kernel = { name = "realthx1/jecs_kernel", version = "~0.2.0" }

[scripts]
analyze = ".lune/analyze.luau"
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
